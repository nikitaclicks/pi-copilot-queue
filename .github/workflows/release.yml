name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      first_release:
        description: Use --first-release for initial npm publish
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.first_release }}" = "true" ]; then
            pnpm exec release-it --ci --first-release --increment "${{ inputs.release_type }}"
          else
            pnpm exec release-it --ci --increment "${{ inputs.release_type }}"
          fi
